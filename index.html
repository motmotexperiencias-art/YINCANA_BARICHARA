<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yincana Barichara | Inicio</title>
    <link rel="stylesheet" href="./css/global.css">
    <style>
        /* Estilos inmersivos para el video de fondo */
        #video-fondo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2; /* Se queda atrás de todo */
        }
        .capa-oscura {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6); /* Oscurece el video para que el texto resalte */
            z-index: -1;
        }
        .btn-sonido {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #ff6600;
            color: #fff;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(255, 102, 0, 0.3);
            transition: 0.3s;
        }
        .btn-sonido:active {
            transform: scale(0.9);
        }
        /* Garantizamos que la app deje ver el video */
        .app-juego {
            background: transparent !important; 
        }
        .caja-contenedor {
            background: rgba(17, 17, 17, 0.95) !important; /* Caja levemente translúcida */
            border: 1px solid #ff6600;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>

    <video id="video-fondo" autoplay loop muted playsinline>
        <source src="https://www.motmotexperiencias.com/wp-content/uploads/2026/01/Diseno-sin-titulo-14.mp4" type="video/mp4">
    </video>
    <div class="capa-oscura"></div>

    <button id="btn-sonido" class="btn-sonido">🔇</button>

    <div id="aviso-carga" class="capa-aviso"></div>

    <div class="app-juego">
        <div class="caja-contenedor">
            <div style="font-size: 50px; margin-bottom: 10px;">🧭</div>
            <div class="glitch-text" style="font-size: 20px;">YINCANA BARICHARA</div>
            
            <p class="texto-mision">Ingresa tu código de acceso para iniciar la misión.</p>

            <input type="text" id="input-ticket" placeholder="Ej: MOT-BAT-SANGIL" style="width: 100%; padding: 15px; margin-bottom: 15px; background: #000; color: #ff6600; border: 1px solid #444; border-radius: 8px; text-transform: uppercase; font-family: 'Courier New', monospace; text-align: center; font-weight: bold; font-size: 16px;">
            
            <div id="caja-nombres" style="display: none; background: rgba(255,102,0,0.05); padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px dashed #333;">
                
                <p id="mensaje-modo" style="color: #00cc66; font-size: 14px; font-weight: bold; margin-bottom: 15px;">✅ Llave Válida</p>

                <input type="text" id="input-guerrero" placeholder="Tu Nombre de Guerrero" style="width: 100%; padding: 15px; margin-bottom: 15px; background: #111; color: #fff; border: 1px solid #444; border-radius: 8px; font-family: 'Courier New', monospace; text-align: center;">

                <input type="text" id="input-equipo" placeholder="Inventa un Nombre de Equipo" style="display: none; width: 100%; padding: 15px; margin-bottom: 5px; background: #111; color: #fff; border: 1px dashed #00cc66; border-radius: 8px; font-family: 'Courier New', monospace; text-align: center;">
            </div>

            <button id="btn-iniciar" class="btn-motmot">VALIDAR CÓDIGO</button>
            <button id="btn-continuar" class="btn-motmot" style="background: transparent; color: #888; border: 1px solid #444; margin-top: 15px;">YA TENGO PARTIDA, CONTINUAR</button>
        </div>
    </div>

    <script>
        document.getElementById('btn-sonido').addEventListener('click', function() {
            const video = document.getElementById('video-fondo');
            if (video.muted) {
                video.muted = false;
                this.innerText = "🔊";
                this.style.borderColor = "#00cc66";
            } else {
                video.muted = true;
                this.innerText = "🔇";
                this.style.borderColor = "#ff6600";
            }
        });
    </script>

    <script type="module" src="./js/auth.js"></script>
    
</body>
</html>
