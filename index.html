<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yincana Barichara | Inicio</title>
    <link rel="stylesheet" href="./css/global.css">
</head>
<body>

    <div id="aviso-carga" class="capa-aviso"></div>

    <div class="app-juego">
        <div class="caja-contenedor">
            <div style="font-size: 50px; margin-bottom: 10px;">🧭</div>
            <div class="glitch-text" style="font-size: 20px;">YINCANA BARICHARA</div>
            
            <div id="paso-1-ticket">
                <p class="texto-mision">Ingresa tu código de acceso para iniciar la misión.</p>
                <input type="text" id="input-ticket" placeholder="Ej: MOT-TEST-001" style="width: 100%; padding: 15px; margin-bottom: 15px; background: #000; color: #ff6600; border: 1px solid #444; border-radius: 8px; text-transform: uppercase; font-family: 'Courier New', monospace; text-align: center; font-weight: bold; font-size: 16px;">
                <button id="btn-buscar-ticket" class="btn-motmot">BUSCAR MISIÓN</button>
            </div>

            <div id="paso-2-lobby" style="display: none;">
                <p class="texto-mision" style="color:#00cc66; font-weight:bold;">✅ Código Válido</p>
                <p class="texto-mision" style="font-size:13px; margin-bottom: 10px;">Únete a tu equipo o crea uno nuevo:</p>
                
                <div id="lista-equipos-lobby" style="max-height: 180px; overflow-y: auto; margin-bottom: 15px; padding-right: 5px;">
                    </div>

                <button id="btn-mostrar-crear" class="btn-motmot" style="background: rgba(255,102,0,0.1); border: 1px dashed #ff6600; margin-bottom: 10px;">+ CREAR NUEVO EQUIPO</button>
                <button id="btn-volver-ticket" class="btn-motmot" style="background: transparent; color: #888; border: 1px solid #333; margin-top: 0;">VOLVER</button>
            </div>

            <div id="paso-3-crear" style="display: none;">
                <p class="texto-mision">Registra a tu escuadrón:</p>
                <input type="text" id="input-equipo" placeholder="Nombre de Equipo (Ej: Los Pumas)" style="width: 100%; padding: 15px; margin-bottom: 15px; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; font-family: 'Courier New', monospace; text-align: center;">

                <select id="select-modo" style="width: 100%; padding: 15px; margin-bottom: 20px; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; font-family: 'Courier New', monospace;">
                    <option value="cooperativo">🤝 Modo Cooperativo (Equipo)</option>
                    <option value="batalla">⚔️ Modo Batalla (Fricción)</option>
                    <option value="guerrero">🐺 Modo Guerrero (Solitario)</option>
                </select>

                <button id="btn-iniciar-nuevo" class="btn-motmot">COMENZAR MISIÓN</button>
                <button id="btn-volver-lobby" class="btn-motmot" style="background: transparent; color: #888; border: 1px solid #333; margin-top: 10px;">CANCELAR</button>
            </div>

        </div>
    </div>

    <script type="module" src="./js/auth.js"></script>

</body>
</html>
