<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yincana Barichara | Inicio</title>
    <link rel="stylesheet" href="./css/global.css">
</head>
<body>

    <div id="aviso-carga" class="capa-aviso"></div>

    <div class="app-juego">
        <div class="caja-contenedor">
            <div style="font-size: 50px; margin-bottom: 10px;">🧭</div>
            <div class="glitch-text" style="font-size: 20px;">YINCANA BARICHARA</div>
            
            <p class="texto-mision">Ingresa tu código de acceso para iniciar la misión.</p>

            <input type="text" id="input-ticket" placeholder="Ej: MOT-TEST-001" style="width: 100%; padding: 15px; margin-bottom: 15px; background: #000; color: #ff6600; border: 1px solid #444; border-radius: 8px; text-transform: uppercase; font-family: 'Courier New', monospace; text-align: center; font-weight: bold; font-size: 16px;">
            
            <select id="select-modo" style="width: 100%; padding: 15px; margin-bottom: 15px; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; font-family: 'Courier New', monospace;">
                <option value="" disabled selected>Selecciona tu Modo de Juego...</option>
                <option value="solitario">🐺 Solitario (1 persona)</option>
                <option value="cooperativo">🤝 Cooperativo (2 a 5 personas)</option>
                <option value="batalla">⚔️ Batalla (Competencia grupal)</option>
            </select>

            <div id="caja-nombres" style="display: none;">
                <input type="text" id="input-guerrero" placeholder="Tu Nombre de Guerrero" style="width: 100%; padding: 15px; margin-bottom: 15px; background: #111; color: #fff; border: 1px solid #444; border-radius: 8px; font-family: 'Courier New', monospace; text-align: center;">

                <input type="text" id="input-equipo" placeholder="Nombre de tu Equipo" style="display: none; width: 100%; padding: 15px; margin-bottom: 15px; background: #111; color: #fff; border: 1px dashed #00cc66; border-radius: 8px; font-family: 'Courier New', monospace; text-align: center;">

                <input type="text" id="input-batalla" placeholder="Nombre de la Batalla (Sala)" style="display: none; width: 100%; padding: 15px; margin-bottom: 15px; background: #111; color: #fff; border: 1px dashed #ff6600; border-radius: 8px; font-family: 'Courier New', monospace; text-align: center;">
            </div>

            <button id="btn-iniciar" class="btn-motmot">INICIAR MISIÓN</button>
            <button id="btn-continuar" class="btn-motmot" style="background: transparent; color: #888; border: 1px solid #444; margin-top: 15px;">YA TENGO PARTIDA, CONTINUAR</button>
        </div>
    </div>

    <script type="module" src="./js/auth.js"></script>
    
    <script>
        document.getElementById('select-modo').addEventListener('change', function() {
            const modo = this.value;
            document.getElementById('caja-nombres').style.display = 'block';
            
            const inputEquipo = document.getElementById('input-equipo');
            const inputBatalla = document.getElementById('input-batalla');
            
            inputEquipo.style.display = 'none';
            inputBatalla.style.display = 'none';
            
            if (modo === 'cooperativo') {
                inputEquipo.style.display = 'block';
            } else if (modo === 'batalla') {
                inputBatalla.style.display = 'block';
            }
        });
    </script>
</body>
</html>
