<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yincana Barichara | Inicio</title>
    <link rel="stylesheet" href="./css/global.css">
</head>
<body>

    <div id="aviso-carga" class="capa-aviso"></div>

    <div class="app-juego">
        <div class="caja-contenedor">
            <div style="font-size: 50px; margin-bottom: 10px;">🧭</div>
            <div class="glitch-text" style="font-size: 20px;">YINCANA BARICHARA</div>
            <p class="texto-mision">Ingresa tu código de acceso para iniciar la misión.</p>

            <input type="text" id="input-ticket" placeholder="Ej: MOT-TEST-001" style="width: 100%; padding: 15px; margin-bottom: 15px; background: #000; color: #ff6600; border: 1px solid #444; border-radius: 8px; text-transform: uppercase; font-family: 'Courier New', monospace; text-align: center; font-weight: bold; font-size: 16px;">
            
            <input type="text" id="input-equipo" placeholder="Nombre de tu Equipo o Jugador" style="width: 100%; padding: 15px; margin-bottom: 15px; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; font-family: 'Courier New', monospace; text-align: center;">

            <select id="select-modo" style="width: 100%; padding: 15px; margin-bottom: 20px; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; font-family: 'Courier New', monospace;">
                <option value="cooperativo">🤝 Modo Cooperativo (Equipo)</option>
                <option value="batalla">⚔️ Modo Batalla (Fricción)</option>
                <option value="guerrero">🐺 Modo Guerrero (Solitario)</option>
            </select>

            <button id="btn-iniciar" class="btn-motmot">VALIDAR E INICIAR</button>
        </div>
    </div>

    <script type="module" src="./js/auth.js"></script>

</body>
</html>
