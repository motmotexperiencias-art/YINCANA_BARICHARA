<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yincana | Pista X</title>
    
    <link rel="stylesheet" href="./css/global.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* Guardián de Orientación (Solo para las pistas) */
        #aviso-orientacion {
            position: fixed; inset: 0; background: #000; z-index: 2147483647; 
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        .icono-giro { font-size: 80px; margin-bottom: 30px; animation: girar 1.5s infinite ease-in-out; color: #ff6600; display: block; }
        @keyframes girar { 0% { transform: rotate(-90deg); opacity: 0.5; } 50% { transform: rotate(0deg); opacity: 1; } 100% { transform: rotate(-90deg); opacity: 0.5; } }
        
        @media screen and (orientation: landscape) and (max-height: 800px) {
            #aviso-orientacion { display: flex !important; }
            .app-juego { visibility: hidden !important; } 
        }
    </style>
</head>
<body>

    <div id="aviso-orientacion">
        <div class="icono-giro">📱</div>
        <h1 style="color:#ff6600; font-size: 24px; margin-bottom: 10px; text-transform: uppercase;">¡Gira tu celular!</h1>
        <p style="color:#fff; font-size:16px;">Para analizar la evidencia correctamente,<br>debes usar la pantalla en <strong>VERTICAL</strong>.</p>
    </div>

    <div id="aviso-carga" class="capa-aviso"></div>

    <div class="app-juego">
        
        <div class="progress-container">
            <div class="progress-bar" id="barra-progreso">
                </div>
        </div>

        <div id="step-intro" class="caja-contenedor">
            <div style="font-size: 50px; margin-bottom:20px;">📍</div>
            <div class="etiqueta-evidencia">PISTA X: EL TÍTULO</div>
            <p class="texto-mision">Aquí irá la narrativa y el acertijo para que el turista descubra a dónde tiene que caminar.</p>
            
            <button class="btn-motmot" id="btn-comenzar">INICIAR RASTREO GPS</button>
        </div>

    </div>

    <script type="module">
        import { forzarFullScreen } from './js/motor.js';

        document.getElementById('btn-comenzar').addEventListener('click', () => {
            forzarFullScreen();
            alert("Aquí se encenderá el GPS para guiar al jugador.");
            // Lógica futura: ocultar intro, mostrar mapa GPS.
        });
    </script>
</body>
</html>
